<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Kannada Unicode Converter | KPWorks</title>

<meta name="description" content="Professional Kannada ASCII to Unicode Converter for Nudi and Baraha. Clean, fast and reliable.">
<link rel="icon" href="static/fav.png">

<script src="static/kn.js?v=2"></script>
<script src="static/app.min.js?v=2"></script>

<style>

:root{
  --primary:#ff6a00;
  --bg:#0f1115;
  --card:#1a1d23;
  --text:#f1f1f1;
  --muted:#9aa0a6;
  --border:#2a2e36;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg,#0f1115,#141822);
  color:var(--text);
}

/* Top minimal bar */

.topbar{
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}

.brand{
  font-weight:600;
  font-size:18px;
  letter-spacing:.5px;
}

.brand span{
  color:var(--primary);
}

.top-links{
  font-size:14px;
}

.top-links a{
  color:var(--muted);
  text-decoration:none;
}

.top-links a:hover{
  color:var(--primary);
}

/* Main layout */

.container{
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:24px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

/* Controls */

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  margin-bottom:20px;
  align-items:center;
}

.controls label{
  font-size:14px;
  color:var(--muted);
}

.controls input[type="radio"],
.controls input[type="checkbox"]{
  margin-right:6px;
}

/* Textarea layout */

.textareas{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

textarea{
  width:100%;
  min-height:220px;
  resize:vertical;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0f1115;
  color:#fff;
  padding:15px;
  font-size:15px;
}

textarea:focus{
  outline:none;
  border-color:var(--primary);
}

/* Action bar */

.actions{
  margin-top:20px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

button{
  background:var(--primary);
  border:none;
  color:white;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
  font-weight:500;
}

button.secondary{
  background:#2a2e36;
  color:#ddd;
}

button:hover{
  opacity:.9;
}

/* Footer */

.footer{
  margin-top:30px;
  text-align:center;
  font-size:13px;
  color:var(--muted);
}

.footer a{
  color:var(--primary);
  text-decoration:none;
}

/* Responsive */

@media(max-width:900px){
  .textareas{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<div class="topbar">
  <div class="brand">KP<span>Works</span> Converter</div>
  <div class="top-links">
    <a href="https://kpworks.site" target="_blank">Creator Vault</a>
  </div>
</div>

<div class="container">
  <div class="card">

    <div class="controls">
      <label>
        <input type="radio" name="mode" value="a2u" checked>
        ASCII → Unicode
      </label>

      <label>
        <input type="radio" name="mode" value="u2a">
        Unicode → ASCII
      </label>

      <label>
        <input type="checkbox" id="englishNumbers">
        English Numbers
      </label>

      <label>
        <input type="checkbox" id="removeSpaces">
        Remove Extra Spaces
      </label>
    </div>

    <div class="textareas">
      <textarea id="inputText" placeholder="Paste your text here..."></textarea>
      <textarea id="outputText" placeholder="Converted output will appear here..."></textarea>
    </div>

    <div class="actions">
      <button class="secondary" onclick="clearText()">Clear</button>
      <button onclick="convertText()">Convert</button>
      <button onclick="copyOutput()">Copy</button>
    </div>

  </div>

  <div class="footer">
    Based on Sanka (GPL v3) by Aravind V K |
    Enhanced UI by KPWorks
  </div>

</div>

<script>

function convertText(){
  const input = document.getElementById("inputText").value;
  const englishNumbers = document.getElementById("englishNumbers").checked;
  const removeSpaces = document.getElementById("removeSpaces").checked;
  const mode = document.querySelector('input[name="mode"]:checked').value;

  let output;

  if(mode === "a2u"){
    output = kn.ascii_to_unicode(input, englishNumbers, removeSpaces);
  }else{
    output = kn.unicode_to_ascii(input, englishNumbers, removeSpaces);
  }

  document.getElementById("outputText").value = output;
}

function copyOutput(){
  const output = document.getElementById("outputText");
  output.select();
  document.execCommand("copy");
  alert("Copied to clipboard!");
}

function clearText(){
  document.getElementById("inputText").value="";
  document.getElementById("outputText").value="";
}

</script>

</body>
</html>
