<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Kannada Unicode Converter | KPWorks</title>

<link rel="icon" href="static/fav.png">

<!-- Required files -->
<script src="static/kn.js"></script>
<script src="static/app.min.js"></script>

<style>
:root{
  --primary:#ff6a00;
  --bg:#f4f6f9;        /* Light default */
  --card:#ffffff;
  --text:#111;
  --muted:#555;
  --border:#ddd;
}

.dark{
  --bg:#0f1115;
  --card:#1b1f27;
  --text:#f1f1f1;
  --muted:#9aa0a6;
  --border:#2a2e36;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* Header */
header{
  height:55px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 18px;
  border-bottom:1px solid var(--border);
}

.brand{
  font-weight:600;
}

.brand span{
  color:var(--primary);
}

.header-controls{
  display:flex;
  gap:10px;
  align-items:center;
}

select{
  padding:5px 8px;
  border-radius:6px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
}

/* Main */
main{
  height:calc(100% - 55px);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:12px;
}

.card{
  width:100%;
  max-width:1100px;
  height:100%;
  max-height:650px;
  background:var(--card);
  border-radius:14px;
  border:1px solid var(--border);
  padding:18px;
  display:flex;
  flex-direction:column;
}

.mode-row{
  display:flex;
  gap:20px;
  font-size:14px;
  margin-bottom:12px;
}

.textareas{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

textarea{
  width:100%;
  height:100%;
  resize:none;
  border-radius:10px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  padding:14px;
  font-size:14px;
}

textarea:focus{
  outline:none;
  border-color:var(--primary);
}

.actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:12px;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary{
  background:var(--primary);
  color:white;
}

.secondary{
  background:var(--border);
  color:var(--text);
}

footer{
  font-size:11px;
  text-align:center;
  padding:6px;
  color:var(--muted);
}

/* Responsive */
@media(max-width:900px){
  .textareas{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="brand">KP<span>Works</span> Converter</div>
  <div class="header-controls">
    <select id="languageToggle" onchange="changeLanguage()">
      <option value="en">English</option>
      <option value="kn">ಕನ್ನಡ</option>
    </select>
    <button onclick="toggleTheme()">🌗</button>
  </div>
</header>

<main>
  <div class="card">

    <div class="mode-row">
      <label>
        <input type="radio" name="mode" value="a2u" checked>
        <span data-en="ASCII → Unicode" data-kn="ಆಸ್ಕಿ → ಯುನಿಕೋಡ್">ASCII → Unicode</span>
      </label>

      <label>
        <input type="radio" name="mode" value="u2a">
        <span data-en="Unicode → ASCII" data-kn="ಯುನಿಕೋಡ್ → ಆಸ್ಕಿ">Unicode → ASCII</span>
      </label>
    </div>

    <div class="textareas">
      <textarea id="inputText"
        placeholder="Paste text here..."
        oninput="convertText()"></textarea>

      <textarea id="outputText"
        placeholder="Converted output will appear here..."
        readonly></textarea>
    </div>

    <div class="actions">
      <button class="secondary" onclick="clearText()">Clear</button>
      <button class="primary" onclick="copyOutput()">Copy</button>
    </div>

  </div>
</main>

<footer>
  Open-source core based on Sanka (GPL v3)
</footer>

<!-- Hidden Elm mount (required for converter to work) -->
<div id="elmapp" style="display:none;"></div>

<script>

/* Proper Elm Initialization */
var app = Elm.Converter.init({
  node: document.getElementById("elmapp")
});

/* Receive converted text */
app.ports.converted_text.subscribe(function(text){
  document.getElementById("outputText").value = text;
});

/* Live conversion */
function convertText(){
  const input = document.getElementById("inputText").value;
  const mode = document.querySelector('input[name="mode"]:checked').value;

  app.ports.convert.send({
    input: input,
    a2u: mode === "a2u",
    englishNumbers: false,
    removeExtraSpaces: false
  });
}

/* Reconvert when mode changes */
document.querySelectorAll('input[name="mode"]').forEach(r=>{
  r.addEventListener("change", convertText);
});

/* Utilities */
function copyOutput(){
  const output=document.getElementById("outputText");
  output.select();
  document.execCommand("copy");
}

function clearText(){
  document.getElementById("inputText").value="";
  document.getElementById("outputText").value="";
}

/* Theme toggle */
function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* Language toggle */
function changeLanguage(){
  const lang=document.getElementById("languageToggle").value;
  document.querySelectorAll("[data-en]").forEach(el=>{
    el.textContent=el.getAttribute("data-"+lang);
  });
}

</script>

</body>
</html>
