<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Kannada Unicode Converter | KPWorks</title>

<script src="static/kn.js?v=2"></script>

<style>
:root{
  --primary:#ff6a00;
  --bg:#0f1115;
  --card:#1c1f26;
  --text:#f1f1f1;
  --muted:#9aa0a6;
  --border:#2a2e36;
}

.light{
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
  --border:#ddd;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid var(--border);
}

.brand{
  font-weight:600;
}

.brand span{
  color:var(--primary);
}

.controls-top{
  display:flex;
  gap:15px;
  align-items:center;
  font-size:14px;
}

main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:1100px;
  height:100%;
  max-height:600px;
  background:var(--card);
  border-radius:16px;
  border:1px solid var(--border);
  padding:20px;
  display:flex;
  flex-direction:column;
}

.mode-row{
  display:flex;
  gap:20px;
  margin-bottom:15px;
  font-size:14px;
}

.textareas{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

textarea{
  width:100%;
  height:100%;
  resize:none;
  border-radius:10px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  padding:15px;
  font-size:14px;
}

textarea:focus{
  outline:none;
  border-color:var(--primary);
}

.actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:15px;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:500;
}

.primary{
  background:var(--primary);
  color:white;
}

.secondary{
  background:var(--border);
  color:var(--text);
}

footer{
  font-size:12px;
  text-align:center;
  padding:8px;
  color:var(--muted);
}

@media(max-width:900px){
  .textareas{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="brand">KP<span>Works</span> Converter</div>
  <div class="controls-top">
    <select id="languageToggle" onchange="changeLanguage()">
      <option value="en">English</option>
      <option value="kn">ಕನ್ನಡ</option>
    </select>
    <button onclick="toggleTheme()">🌗</button>
  </div>
</header>

<main>
  <div class="card">

    <div class="mode-row">
      <label><input type="radio" name="mode" value="a2u" checked> <span data-en="ASCII → Unicode" data-kn="ಆಸ್ಕಿ → ಯುನಿಕೋಡ್">ASCII → Unicode</span></label>
      <label><input type="radio" name="mode" value="u2a"> <span data-en="Unicode → ASCII" data-kn="ಯುನಿಕೋಡ್ → ಆಸ್ಕಿ">Unicode → ASCII</span></label>
    </div>

    <div class="textareas">
      <textarea id="inputText" placeholder="Paste text here..."></textarea>
      <textarea id="outputText" placeholder="Converted output will appear here..."></textarea>
    </div>

    <div class="actions">
      <button class="secondary" onclick="clearText()">Clear</button>
      <button class="primary" onclick="convertText()">Convert</button>
      <button class="primary" onclick="copyOutput()">Copy</button>
    </div>

  </div>
</main>

<footer>
  Open-source core based on Sanka (GPL v3)
</footer>

<script>

function convertText(){
  const input=document.getElementById("inputText").value;
  const mode=document.querySelector('input[name="mode"]:checked').value;

  let output;

  if(mode==="a2u"){
    output=kn.ascii_to_unicode(input,false,false);
  }else{
    output=kn.unicode_to_ascii(input,false,false);
  }

  document.getElementById("outputText").value=output;
}

function copyOutput(){
  const output=document.getElementById("outputText");
  output.select();
  document.execCommand("copy");
}

function clearText(){
  document.getElementById("inputText").value="";
  document.getElementById("outputText").value="";
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

function changeLanguage(){
  const lang=document.getElementById("languageToggle").value;
  document.querySelectorAll("[data-en]").forEach(el=>{
    el.textContent=el.getAttribute("data-"+lang);
  });
}

</script>

</body>
</html>
