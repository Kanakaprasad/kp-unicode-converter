<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Kannada ASCII to Unicode Converter | KPWorks</title>

    <meta name="description" content="Free Kannada ASCII to Unicode converter for Nudi and Baraha. Convert legacy Kannada fonts to Unicode online instantly." />
    <meta name="keywords" content="Kannada ASCII to Unicode, Nudi to Unicode, Baraha converter, Kannada font conversion, Kannada typing tool" />

    <meta property="og:title" content="Kannada ASCII to Unicode Converter | KPWorks"/>
    <meta property="og:description" content="Convert Nudi/Baraha ASCII Kannada text to Unicode and back. Free online tool."/>
    <meta property="og:url" content="https://converter.kpworks.site/" />
    <meta property="og:type" content="website" />

    <link rel="icon" href="static/fav.png" />
    <link rel="apple-touch-icon" href="static/fav.png" />

    <link rel="stylesheet" href="static/app.css?v=3" />

    <script src="static/kn.js?v=2"></script>
    <script src="static/app.min.js?v=2"></script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111;
            color: #222;
        }

        .header {
            background: #1f1f1f;
            color: white;
            text-align: center;
            padding: 20px 10px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            color: #ff7a00;
        }

        .header p {
            margin: 5px 0 0;
            font-size: 14px;
            opacity: 0.8;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            background: #f5d7a7;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #aaa;
        }

        .footer a {
            color: #ff7a00;
            text-decoration: none;
        }

        .action-buttons {
            margin-top: 15px;
            text-align: right;
        }

        .action-buttons button {
            background: #ff7a00;
            border: none;
            padding: 8px 14px;
            margin-left: 5px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .action-buttons button:hover {
            opacity: 0.9;
        }

        @media(max-width: 768px){
            .container {
                margin: 10px;
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Kannada ASCII ↔ Unicode Converter</h1>
        <p>Enhanced by <a href="https://www.kpworks.site" target="_blank" style="color:#ff7a00;">KPWorks</a> | Based on Sanka (GPL v3)</p>
    </div>

    <div class="container">

        <div id="elmapp"></div>

        <div class="action-buttons">
            <button onclick="copyOutput()">Copy Output</button>
            <button onclick="clearText()">Clear</button>
        </div>

    </div>

    <div class="footer">
        <p>
            Original Project by <a href="https://aravindavk.in" target="_blank">Aravind V K</a> |
            Licensed under GPL v3
        </p>
        <p>
            Visit Creator Vault →
            <a href="https://www.kpworks.site" target="_blank">kpworks.site</a>
        </p>
    </div>

<script>
    var app = Elm.Converter.init({
        node: document.getElementById('elmapp')
    });

    app.ports.convert.subscribe(function(args) {
        let out;
        if (args.a2u){
            out = kn.ascii_to_unicode(args.input, args.englishNumbers, args.removeExtraSpaces);
        } else {
            out = kn.unicode_to_ascii(args.input, args.englishNumbers, args.removeExtraSpaces);
        }
        app.ports.converted_text.send(out);
    });

    function copyOutput(){
        const textareas = document.querySelectorAll("textarea");
        if(textareas.length > 1){
            textareas[1].select();
            document.execCommand("copy");
            alert("Copied to clipboard!");
        }
    }

    function clearText(){
        const textareas = document.querySelectorAll("textarea");
        textareas.forEach(t => t.value = "");
    }
</script>

</body>
</html>
